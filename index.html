// ===================================================================
// 플레이어 피해 / 회복 / 파티클
// ===================================================================

  p.hp -= dmg; p.invuln = 0.85; game.shake = Math.max(game.shake, 6); spawnParticles(p.x, p.y, '#ff4d4d', 14); spawnRing(p.x, p.y, '#ff5a5a', 48, { life: 0.32, width: 3.6 }); setFlash(0.22, '#ff5566');

}
function tickDamage(dmg) { const p = game.player; if (p.hp <= 0) return; p.hp -= dmg; if (Math.random() < 0.12) spawnParticles(p.x, p.y, '#ff7a4d', 2); if (p.hp <= 0) { p.hp = 0; gameOver(); } }

function healPlayer(a) { game.player.hp = clamp(game.player.hp + a, 0, game.player.maxHp); spawnParticles(game.player.x, game.player.y, '#5fd66a', 8); }

// ---------- 타격 링 / 섬광 ----------
function spawnRing(x, y, color, rMax, opts) { opts = opts || {}; if (game.rings.length > 80) game.rings.shift(); const life = opts.life || 0.24, r0 = opts.r0 || 3; game.rings.push({ x, y, color, r0, rMax, rr: r0, life, max: life, width: opts.width || 2.5, core: opts.core !== false }); }
function setFlash(amt, color) { if (amt > game.flash) { game.flash = amt; game.flashColor = color || '#fff'; } }
function updateParticles(dt) {

  for (let i = game.rings.length; i--;) { const rg = game.rings[i]; rg.life -= dt; if (rg.life <= 0) { game.rings.splice(i, 1); continue; } const t = 1 - rg.life / rg.max; rg.rr = rg.r0 + (rg.rMax - rg.r0) * (1 - (1 - t) * (1 - t)); }
}

// ===================================================================
// 플레이어 이동
// ===================================================================
function updatePlayer(dt) {

  const m = game._mouse;

  let kx = 0, ky = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) kx -= 1; if (keys['ArrowRight'] || keys['KeyD']) kx += 1;
  if (keys['ArrowUp']) ky -= 1; if (keys['ArrowDown'] || keys['KeyS']) ky += 1;
  const baseSpeed = 430 * game.mods.speedMul * playerSpeedBuffMul() * (p.rooted > 0 ? 0.35 : 1) * Math.max(0.4, 1 - 0.05 * heartBeats());
  p.px = p.x; p.py = p.y;
  if (kx || ky) { const l = Math.hypot(kx, ky) || 1; p.x = clamp(p.x + (kx / l) * baseSpeed * dt, 16, VW - 16); p.y = clamp(p.y + (ky / l) * baseSpeed * dt, 16, VH - 16); game.path = []; }

    if (game.path.length) { let budget = baseSpeed * dt; while (budget > 0 && game.path.length) { const tgt = game.path[0], dx = tgt.x - p.x, dy = tgt.y - p.y, d = Math.hypot(dx, dy); if (d <= budget) { p.x = tgt.x; p.y = tgt.y; game.path.shift(); budget -= d; } else { p.x += dx / d * budget; p.y += dy / d * budget; budget = 0; } } }

  p.bank = lerp(p.bank, clamp(p.vy / 900, -0.5, 0.5), 0.18);
}

// ===================================================================
// 루프
// ===================================================================
let last = performance.now();
function frame(now) { let dt = (now - last) / 1000; last = now; dt = Math.min(dt, 1 / 30); update(dt); render(); requestAnimationFrame(frame); }
function update(dt) {

  syncBgmRate();
  if (game.toast) { game.toast.t -= dt; if (game.toast.t <= 0) game.toast = null; }
  if (game.paused) return;
  game.shake = Math.max(0, game.shake - dt * 18);
  game.flash = Math.max(0, game.flash - dt * 3.2);
  if (game.state === STATE.FLIGHT || game.state === STATE.BOSS) {
    if (game.player.active) game.bgScroll += dt * 60;
    updatePlayer(dt); tryFire(dt); updateProjectiles(dt); updateWarnings(dt); updateBullets(dt); updateObstacles(dt); updateMinions(dt); updateEggs(dt); updateAllies(dt); updateFoods(dt);
    if (game.transform) updateTransform(dt);
    if (game.transformCd > 0) game.transformCd = Math.max(0, game.transformCd - dt);
    game.buffFire = Math.max(0, game.buffFire - dt); game.buffAtk = Math.max(0, game.buffAtk - dt);
    updateAllyBuffs(dt);
    if (game.ultFx) { game.ultFx.t -= dt; if (game.ultFx.t <= 0) game.ultFx = null; }
  }
  updateParticles(dt);
  if (game.state === STATE.FLIGHT) {
    if (game.player.active) { game.flightTimer -= dt; game._obsTimer -= dt; if (game._obsTimer <= 0 && game.flightTimer > 1.2) { spawnObstacle(null); game._obsTimer = rand(0.7, 1.4); } if (game.flightTimer <= 0) startEncounter(); }
  } else if (game.state === STATE.BOSS) {
    updateBosses(dt);
    if (game.whale) updateWhale(dt);

  }
}

// ===================================================================
// 렌더
// ===================================================================
function render() {
  ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0); ctx.clearRect(0, 0, canvas.width, canvas.height);
  const sh = game.paused ? 0 : game.shake;
  const sx = sh ? rand(-sh, sh) : 0, sy = sh ? rand(-sh, sh) : 0;
  ctx.setTransform(view.scale * view.dpr, 0, 0, view.scale * view.dpr, (view.ox + sx) * view.dpr, (view.oy + sy) * view.dpr);
  drawBackground();
  if (game.state === STATE.TITLE) { drawTitle(); return; }
  if (game.state === STATE.HELP) { drawTitle(); drawHelp(); return; }
  if (game.state === STATE.CODEX) { drawCodex(); return; }
  if (game.state === STATE.LOADOUT) { drawLoadout(); return; }
  drawZones(); drawObstacles(); drawEggs(); drawMinions();
  for (const b of game.bosses) drawBoss(b);
  if (game.whale) drawWhale();
  drawFoods();
  drawProjectiles(); drawBullets(); drawWarnings();
  for (const b of game.bosses) if (b.seq && b.seq.kind === 'bubble') drawBubbles(b.seq);
  drawRain(); drawAllies();
  if (!game.player.active && game.state === STATE.FLIGHT) drawGround();
  if (game.state !== STATE.OVER) drawPlayer();
  drawParticles(); drawRings(); drawPath(); drawHUD();
  if (game.flash > 0.001) { ctx.save(); ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = clamp(game.flash, 0, 0.6); ctx.fillStyle = game.flashColor; ctx.fillRect(0, 0, VW, VH); ctx.restore(); ctx.globalAlpha = 1; }

  if (game.toast) { ctx.globalAlpha = clamp(game.toast.t, 0, 1); ctx.fillStyle = 'rgba(0,0,0,0.6)'; const tw = ctx.measureText(game.toast.text).width; roundRect(VW / 2 - 220, 150, 440, 44, 10); ctx.fill(); ctx.fillStyle = GOLD_HEX; ctx.font = '700 18px "Malgun Gothic", sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(game.toast.text, VW / 2, 172); ctx.globalAlpha = 1; }
  if (game.state === STATE.REWARD) drawReward();

}
const INDUSTRIAL_SKY = ['#221b16', '#5e4230', '#bf8a52'];
function drawGear(cx, cy, r, teeth, rot, color, alpha) {
  ctx.save(); ctx.globalAlpha = alpha; ctx.translate(cx, cy); ctx.rotate(rot); ctx.fillStyle = color;
  const steps = teeth * 2; ctx.beginPath();
  for (let i = 0; i <= steps; i++) { const ang = (i / steps) * TAU, rr = (i % 2 === 0) ? r : r * 0.82, x = Math.cos(ang) * rr, y = Math.sin(ang) * rr; if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y); }

function drawBackground() {
  const themed = (game.state === STATE.BOSS || game.state === STATE.REWARD);

  const g = ctx.createLinearGradient(0, 0, 0, VH);
  if (sky.length >= 3) { g.addColorStop(0, sky[0]); g.addColorStop(0.5, sky[1]); g.addColorStop(1, sky[2]); }
  else { g.addColorStop(0, sky[0]); g.addColorStop(1, sky[1]); }
  ctx.fillStyle = g; ctx.fillRect(0, 0, VW, VH);
  const t = game.t, scroll = game.bgScroll;

  // 1) 매연 너머 거대 톱니바퀴(천천히 회전)

  drawGear(1078, 116, 104, 10, -t * 0.17, '#1b1510', 0.14);

  ctx.fillStyle = hg; ctx.fillRect(0, VH * 0.42, VW, VH * 0.58);
  // 3) 공장 스카이라인 + 굴뚝(스크롤 실루엣)
  const span = 1640, stacks = [];
  for (let i = 0; i < 9; i++) {
    const bx = ((i * 182 - scroll * 0.18) % span + span) % span - 180;
    if (i % 3 === 1) { const w = 28, h = 240 + (i % 2) * 64, x = bx + 64, yTop = VH - h; ctx.fillStyle = '#191310'; ctx.fillRect(x, yTop, w, h); ctx.fillRect(x - 5, yTop, w + 10, 14); stacks.push({ x: x + w / 2, y: yTop }); }

      ctx.beginPath(); for (let s = 0; s < 5; s++) { const sx = x + s * 32; ctx.moveTo(sx, yTop); ctx.lineTo(sx + 16, yTop - 16); ctx.lineTo(sx + 32, yTop); } ctx.fill();
      ctx.fillStyle = 'rgba(255,178,92,0.45)'; for (let wy = 0; wy < 2; wy++) for (let wx = 0; wx < 3; wx++) ctx.fillRect(x + 20 + wx * 42, yTop + 26 + wy * 36, 15, 20);
    }
